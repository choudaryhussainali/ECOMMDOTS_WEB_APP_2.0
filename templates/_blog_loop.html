{% for article in articles %}
<div class="blog-card {% if article.is_wide %}card-wide{% endif %}">
    <div class="card-media">
        <img src="{{ article.thumbnail_url }}" alt="{{ article.title }}">
        <div class="card-media-overlay"></div>
        <div class="card-cat-badge badge-{{ article.category | lower | replace(' ', '-') | replace('&', '') }}">
            {{ article.category }}
        </div>
        <div class="card-read-time">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            {{ article.read_time }} min
        </div>
    </div>
    
    <div class="card-body">
        <div class="card-meta">
            <span>{{ article.publish_date }}</span>
            <span class="card-meta-dot"></span>
            <span>{{ article.subcategory }}</span>
        </div>
        <h3 class="card-title">
            <a href="{{ url_for('article_view', slug=article.slug) }}" style="color: inherit; text-decoration: none;">
                {{ article.title }}
            </a>
        </h3>
        <p class="card-excerpt">{{ article.excerpt }}</p>
        <div class="card-footer">
            <div class="card-author-mini">
                <img src="{{ article.author_image }}" alt="{{ article.author_name }}">
                <span class="card-author-name">{{ article.author_name }}</span>
            </div>
            <div class="card-arrow">
                <a href="{{ url_for('article_view', slug=article.slug) }}">
                    <svg viewBox="0 0 24 24"><path d="M7 17L17 7M7 7h10v10" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </a>
            </div>
        </div>
    </div>
</div>
{% endfor %}
